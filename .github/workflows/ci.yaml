name: CI Pipeline

on:
  pull_request:
    branches: ["main"]
  
  push:
    branches:
      - "main"
jobs:
  test-backend:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        working-directory: Backend
        run: bun install
      
      - name: Run linter
        working-directory: Backend
        run: bun linter

      - name: Run tests
        working-directory: Backend
        run: bun run lint
      
      - name: Run tests
        working-directory: Backend
        run: bun test
        env:
          REDIS_URL: redis://localhost:6379
          PORT: 3000

  test-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: Frontend
        run: bun install

      - name: Run linter
        working-directory: frontend
        run: bun run lint

      - name: Build check
        working-directory: frontend
        run: bun run Build
  
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend,test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start all services
        run: docker compose up -d
      
      - name: Wait for services
        run: sleep 15
      
      - name: Check containers are running
        run: docker compose ps
      
      - name: Tear down
        run: docker compose down
      

