version: "3.9"

services:
  redis:
    image: redis:alpine
    container_name: sniply-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  redisinsight:
    image: redis/redisinsight:latest
    container_name: sniply-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: always
    depends_on:
      redis:
        condition: service_healthy
  backend:
    build: ./backend
    container_name: sniply-backend
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
    restart: always
    depends_on:
      redis:
        condition: service_healthy
  frontend:
    build: ./frontend
    container_name: sniply-frontend
    ports:
      - "5173:5173"
    restart: always
    depends_on:
      backend:
        condition: service_started
volumes:
  redis_data:
  redisinsight_data: