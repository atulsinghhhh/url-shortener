version: '3.9'

services:
  redis:
    image: redis:alpine
    container_name: sniply-redis
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data: